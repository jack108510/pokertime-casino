<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokerTime — Learn Poker. Level Up.</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#0a0a0a;color:#e2e2e2;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden}

/* Header */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06)}
.top-bar .logo{font-size:1.3rem;font-weight:800;letter-spacing:1px;background:linear-gradient(135deg,#f6d365,#fda085);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-bar .progress-wrap{display:flex;align-items:center;gap:10px;font-size:.85rem;color:#999}
.progress-bar{width:120px;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#f6d365,#fda085);border-radius:3px;transition:width .4s}
.chip-count{display:flex;align-items:center;gap:4px;color:#f6d365;font-weight:700;font-size:.9rem}
.chip-icon{width:20px;height:20px;background:linear-gradient(135deg,#f6d365,#e8a317);border-radius:50%;border:2px solid #fff;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;color:#333}

/* Map */
.map-container{padding-top:60px}
.tier{position:relative;min-height:340px;padding:40px 20px 20px;overflow:hidden;transition:filter .6s,opacity .6s}
.tier.locked{filter:blur(3px) brightness(0.3);pointer-events:none}
.tier.locked::after{content:'🔒 COMPLETE PREVIOUS TIER TO UNLOCK';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1rem;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-align:center;filter:none}
.tier-label{text-align:center;margin-bottom:24px;position:relative;z-index:2}
.tier-label h2{font-size:1.4rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.tier-label p{font-size:.8rem;opacity:.6;letter-spacing:1px}

/* Tier Themes */
.tier-1{background:linear-gradient(180deg,#1a1008 0%,#0d0a04 100%)}
.tier-1 .tier-label h2{color:#c89b3c;text-shadow:0 0 20px rgba(200,155,60,0.3)}
.tier-1 .floor{background:repeating-conic-gradient(#1a1a1a 0% 25%,#161616 0% 50%) 0 0/40px 40px}

.tier-2{background:linear-gradient(180deg,#1c1410 0%,#120e0a 100%)}
.tier-2 .tier-label h2{color:#d4a76a;text-shadow:0 0 20px rgba(212,167,106,0.3)}

.tier-3{background:linear-gradient(180deg,#0f1020 0%,#0a0b15 100%)}
.tier-3 .tier-label h2{color:#e84393;text-shadow:0 0 30px rgba(232,67,147,0.4)}

.tier-4{background:linear-gradient(180deg,#1a1520 0%,#0f0c14 100%)}
.tier-4 .tier-label h2{color:#f8d868;text-shadow:0 0 30px rgba(248,216,104,0.5)}

.tier-5{background:linear-gradient(180deg,#0d1520 0%,#060a12 100%)}
.tier-5 .tier-label h2{color:#7ef9ff;text-shadow:0 0 30px rgba(126,249,255,0.4)}

/* Floor */
.floor{position:relative;max-width:900px;margin:0 auto;border-radius:16px;padding:30px 20px;min-height:220px}

.tier-1 .floor{background:radial-gradient(ellipse at center,#1c1810 0%,#0f0d08 100%);border:1px solid #2a2318}
.tier-2 .floor{background:radial-gradient(ellipse at center,#1e1812 0%,#110e0a 100%);border:1px solid #2e2418}
.tier-3 .floor{background:radial-gradient(ellipse at center,#12101e 0%,#0a0915 100%);border:1px solid #1e1a2e}
.tier-4 .floor{background:radial-gradient(ellipse at center,#1e1820 0%,#100c14 100%);border:1px solid #302838;box-shadow:inset 0 0 60px rgba(248,216,104,0.05)}
.tier-5 .floor{background:radial-gradient(ellipse at center,#0e1820 0%,#060a12 100%);border:1px solid #183038;box-shadow:inset 0 0 80px rgba(126,249,255,0.05)}

/* Tables */
.tables-row{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;position:relative;z-index:2}
.poker-table{width:200px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform .25s,box-shadow .25s}
.poker-table:hover{transform:scale(1.08);z-index:5}
.poker-table .lesson-num{font-size:.65rem;font-weight:700;opacity:.7;margin-bottom:2px;letter-spacing:1px}
.poker-table .lesson-name{font-size:.75rem;font-weight:600;text-align:center;padding:0 12px;line-height:1.3}
.poker-table .chips-deco{position:absolute;bottom:-6px;display:flex;gap:2px}
.poker-table .chips-deco span{width:10px;height:6px;border-radius:3px}

/* Table styles per tier */
.tier-1 .poker-table{background:radial-gradient(ellipse,#2a4a2a 0%,#1a3a1a 100%);border:3px solid #3a3a2a;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.tier-1 .poker-table:hover{box-shadow:0 8px 30px rgba(200,155,60,0.2)}
.tier-1 .poker-table .lesson-name{color:#c89b3c}
.tier-1 .poker-table .chips-deco span{background:#555}

.tier-2 .poker-table{background:radial-gradient(ellipse,#2a4a2a 0%,#1a3a1a 100%);border:3px solid #4a3a2a;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.tier-2 .poker-table:hover{box-shadow:0 8px 30px rgba(212,167,106,0.2)}
.tier-2 .poker-table .lesson-name{color:#d4a76a}
.tier-2 .poker-table .chips-deco span{background:linear-gradient(#c0392b,#8e2424)}

.tier-3 .poker-table{background:radial-gradient(ellipse,#1a3a2a 0%,#0a2a1a 100%);border:3px solid #3a2a4a;box-shadow:0 4px 20px rgba(0,0,0,0.5),inset 0 0 15px rgba(232,67,147,0.1)}
.tier-3 .poker-table:hover{box-shadow:0 8px 30px rgba(232,67,147,0.25)}
.tier-3 .poker-table .lesson-name{color:#e84393}
.tier-3 .poker-table .chips-deco span{background:linear-gradient(#8e44ad,#6c3483)}

.tier-4 .poker-table{background:radial-gradient(ellipse,#1a4a2a 0%,#0a3a1a 100%);border:3px solid #5a4a2a;box-shadow:0 4px 20px rgba(0,0,0,0.5),inset 0 0 20px rgba(248,216,104,0.1)}
.tier-4 .poker-table:hover{box-shadow:0 8px 30px rgba(248,216,104,0.3)}
.tier-4 .poker-table .lesson-name{color:#f8d868}
.tier-4 .poker-table .chips-deco span{background:linear-gradient(#f8d868,#d4a030)}

.tier-5 .poker-table{background:radial-gradient(ellipse,#1a3a4a 0%,#0a2a3a 100%);border:3px solid #2a4a5a;box-shadow:0 4px 20px rgba(0,0,0,0.5),inset 0 0 25px rgba(126,249,255,0.1)}
.tier-5 .poker-table:hover{box-shadow:0 8px 30px rgba(126,249,255,0.3)}
.tier-5 .poker-table .lesson-name{color:#7ef9ff}
.tier-5 .poker-table .chips-deco span{background:linear-gradient(#7ef9ff,#4ac6db)}

/* Completed table */
.poker-table.completed{border-color:#27ae60!important}
.poker-table.completed::before{content:'✓';position:absolute;top:-8px;right:-4px;width:20px;height:20px;background:#27ae60;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;color:#fff}

/* Connector arrows between tiers */
.tier-connector{text-align:center;padding:8px 0;position:relative;z-index:2}
.tier-connector .arrow{display:inline-block;width:30px;height:30px;border-left:2px solid #333;border-bottom:2px solid #333;transform:rotate(-45deg);margin:0 auto;opacity:.4}

/* Ambient decorations */
.deco{position:absolute;pointer-events:none;z-index:1;opacity:.15}
.deco-card{width:20px;height:28px;border-radius:2px;border:1px solid #555;background:#1a1a2a}
.deco-chip{width:14px;height:8px;border-radius:4px}
.deco-glass{width:12px;height:18px;border-radius:2px 2px 4px 4px;border:1px solid #555}

/* Animations */
@keyframes flicker{0%,100%{opacity:.15}50%{opacity:.25}}
@keyframes neonPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes sparkle{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0)}}
@keyframes floatUp{0%{transform:translateY(0);opacity:.3}100%{transform:translateY(-20px);opacity:0}}

.tier-1 .deco{animation:flicker 3s infinite}
.tier-3 .deco{animation:neonPulse 2s infinite}
.tier-5 .deco{animation:sparkle 2s infinite}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1a1a1a;border-radius:16px;padding:32px;max-width:420px;width:90%;position:relative;border:1px solid #2a2a2a;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal .close-btn{position:absolute;top:12px;right:16px;background:none;border:none;color:#666;font-size:1.5rem;cursor:pointer;transition:color .2s}
.modal .close-btn:hover{color:#fff}
.modal .modal-tier{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.modal .modal-title{font-size:1.4rem;font-weight:800;margin-bottom:12px}
.modal .modal-desc{font-size:.9rem;color:#999;line-height:1.6;margin-bottom:24px}
.modal .start-btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform .15s,box-shadow .15s}
.modal .start-btn:hover{transform:translateY(-2px)}
.modal .start-btn:active{transform:translateY(0)}

/* Responsive */
@media(max-width:600px){
.poker-table{width:140px;height:90px}
.poker-table .lesson-name{font-size:.65rem;padding:0 8px}
.poker-table .lesson-num{font-size:.55rem}
.tier-label h2{font-size:1.1rem}
.tables-row{gap:12px}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">♠ PokerTime</div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="chip-count"><span class="chip-icon">$</span><span id="chipCount">0</span></div>
  </div>
</div>

<div class="map-container" id="mapContainer"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="modal-tier" id="modalTier"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <button class="start-btn" id="modalBtn" onclick="startLesson()">Start Lesson</button>
  </div>
</div>

<script>
const TIERS = [
  {
    id: 'basement', name: 'The Basement', subtitle: 'Every pro started somewhere',
    theme: 'tier-1', btnColor: '#c89b3c',
    lessons: [
      { id:1, title:'Poker Hand Rankings', desc:'Learn the hierarchy of poker hands — from a high card to a royal flush. This is the foundation of everything.' },
      { id:2, title:'Basic Rules & Flow', desc:'How a hand plays out: dealing, betting rounds, showdown. Understand the rhythm of the game.' },
      { id:3, title:'Understanding Blinds', desc:'Small blind, big blind, and why position matters before the cards are even dealt.' }
    ]
  },
  {
    id: 'local', name: 'The Local Card Room', subtitle: 'Graduating from the kitchen table',
    theme: 'tier-2', btnColor: '#d4a76a',
    lessons: [
      { id:4, title:'Pot Odds', desc:'Is the call worth it? Learn to calculate whether the pot justifies your investment.' },
      { id:5, title:'Position Play', desc:'Acting last is a superpower. Learn why seat selection drives every decision.' },
      { id:6, title:'Pre-flop Strategy', desc:'Which hands to play, which to fold, and how your position changes the answer.' },
      { id:7, title:'Reading the Board', desc:'What the community cards tell you — and what they tell your opponents about you.' }
    ]
  },
  {
    id: 'downtown', name: 'Downtown Casino', subtitle: 'The real game begins',
    theme: 'tier-3', btnColor: '#e84393',
    lessons: [
      { id:8, title:'Bluffing Fundamentals', desc:'When to bluff, when to fold, and why the best bluffs tell a consistent story.' },
      { id:9, title:'Bet Sizing', desc:'Small ball or big guns? Learn how your bet size communicates strength or sets traps.' },
      { id:10, title:'Continuation Bets', desc:'You raised pre-flop — now what? The art of the c-bet and when to fire.' },
      { id:11, title:'Hand Ranges', desc:'Stop putting opponents on one hand. Learn to think in ranges and narrow them street by street.' },
      { id:12, title:'Tournament vs Cash', desc:'Two different games. Learn when survival matters and when chip accumulation is king.' }
    ]
  },
  {
    id: 'vegas', name: 'The Strip — Vegas', subtitle: 'Big lights, bigger stakes',
    theme: 'tier-4', btnColor: '#f8d868',
    lessons: [
      { id:13, title:'Advanced Bluffing', desc:'Double barrels, float plays, and the check-raise bluff. Weaponize your aggression.' },
      { id:14, title:'GTO Basics', desc:'Game Theory Optimal strategy — the mathematically unexploitable approach to poker.' },
      { id:15, title:'Exploitative Play', desc:'GTO is defense. Exploitative is offense. Learn to read and punish specific tendencies.' },
      { id:16, title:'Multi-way Pots', desc:'More players, more complexity. How to adjust when the pot is crowded.' },
      { id:17, title:'ICM Pressure', desc:'Independent Chip Model — why your chips are worth more than you think in tournaments.' }
    ]
  },
  {
    id: 'highroller', name: 'Macau · Monte Carlo', subtitle: 'Where legends are made',
    theme: 'tier-5', btnColor: '#7ef9ff',
    lessons: [
      { id:18, title:'High Roller Psychology', desc:'The mental game at the highest stakes. Tilt control, focus, and emotional resilience.' },
      { id:19, title:'Mixed Games (HORSE)', desc:'Hold\'em, Omaha, Razz, Stud, Eight-or-better. Become a complete poker player.' },
      { id:20, title:'Heads-Up Mastery', desc:'One on one. No place to hide. Learn the most aggressive and skill-intensive form of poker.' },
      { id:21, title:'The Final Table', desc:'Everything you\'ve learned converges here. Pressure, ICM, crowd, cameras. This is it.' }
    ]
  }
];

let completed = new Set(JSON.parse(localStorage.getItem('pt_completed') || '[]'));
let currentLesson = null;

function save() {
  localStorage.setItem('pt_completed', JSON.stringify([...completed]));
  updateProgress();
}

function updateProgress() {
  const total = TIERS.reduce((s,t) => s + t.lessons.length, 0);
  const done = completed.size;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('chipCount').textContent = done * 100;
}

function getTierProgress(tierIdx) {
  const tier = TIERS[tierIdx];
  const done = tier.lessons.filter(l => completed.has(l.id)).length;
  return done === tier.lessons.length ? 'complete' : done > 0 ? 'in-progress' : 'new';
}

function isUnlocked(tierIdx) {
  if (tierIdx === 0) return true;
  return getTierProgress(tierIdx - 1) === 'complete';
}

function buildMap() {
  const container = document.getElementById('mapContainer');
  container.innerHTML = '';

  TIERS.forEach((tier, tIdx) => {
    const unlocked = isUnlocked(tIdx);
    const tierEl = document.createElement('div');
    tierEl.className = `tier ${tier.theme}${unlocked ? '' : ' locked'}`;
    tierEl.id = `tier-${tIdx}`;

    // Ambient decorations
    let decos = '';
    for (let i = 0; i < 8; i++) {
      const x = 5 + Math.random() * 90;
      const y = 10 + Math.random() * 80;
      const types = ['deco-card', 'deco-chip', 'deco-glass'];
      const type = types[i % 3];
      const delay = Math.random() * 3;
      decos += `<div class="deco ${type}" style="left:${x}%;top:${y}%;animation-delay:${delay}s"></div>`;
    }

    let tablesHtml = '';
    tier.lessons.forEach(lesson => {
      const isComplete = completed.has(lesson.id);
      const chipsHtml = '<span></span><span></span><span></span>';
      tablesHtml += `
        <div class="poker-table${isComplete ? ' completed' : ''}" data-lesson="${lesson.id}" data-tier="${tIdx}" onclick="openModal(${lesson.id},${tIdx})">
          <span class="lesson-num">Lesson ${lesson.id}</span>
          <span class="lesson-name">${lesson.title}</span>
          <div class="chips-deco">${chipsHtml}</div>
        </div>`;
    });

    tierEl.innerHTML = `
      <div class="tier-label">
        <h2>${tier.name}</h2>
        <p>${tier.subtitle}</p>
      </div>
      <div class="floor">
        ${decos}
        <div class="tables-row">${tablesHtml}</div>
      </div>`;

    container.appendChild(tierEl);

    // Connector arrow (except after last tier)
    if (tIdx < TIERS.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'tier-connector';
      conn.innerHTML = '<div class="arrow"></div>';
      container.appendChild(conn);
    }
  });

  updateProgress();
}

function openModal(lessonId, tierIdx) {
  const tier = TIERS[tierIdx];
  const lesson = tier.lessons.find(l => l.id === lessonId);
  if (!lesson) return;

  currentLesson = { lessonId, tierIdx };
  const overlay = document.getElementById('modalOverlay');
  const isComplete = completed.has(lessonId);

  document.getElementById('modalTier').textContent = tier.name;
  document.getElementById('modalTier').style.color = tier.btnColor;
  document.getElementById('modalTitle').textContent = lesson.title;
  document.getElementById('modalDesc').textContent = lesson.desc;

  const btn = document.getElementById('modalBtn');
  btn.textContent = isComplete ? '✓ Completed — Replay' : 'Start Lesson';
  btn.style.background = tier.btnColor;
  btn.style.color = tIdx >= 3 ? '#111' : '#fff';

  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentLesson = null;
}

function startLesson() {
  if (!currentLesson) return;
  completed.add(currentLesson.lessonId);
  save();
  closeModal();
  buildMap();
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
buildMap();
</script>
</body>
</html>
